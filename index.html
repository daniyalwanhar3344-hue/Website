<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f0f0f0;
      margin: 0;
      padding: 0;
    }

    #loginForm {
      margin-top: 30px;
    }

    #loginForm input {
      padding: 10px;
      font-size: 16px;
      margin: 5px 0;
      width: 200px;
    }

    #loginForm button {
      padding: 10px 20px;
      font-size: 16px;
      background-color: #007BFF;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    #loginForm button:hover {
      background-color: #0056b3;
    }

    #userList {
      margin-top: 30px;
      font-size: 18px;
    }

    #videoContainer {
      margin-top: 20px;
    }

    #video {
      border: 2px solid #333;
      max-width: 100%;
      height: auto;
    }

    #location {
      margin-top: 20px;
      font-size: 18px;
    }

    #status {
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>Admin Login</h1>

  <div id="loginForm">
    <input type="text" id="username" placeholder="Username" />
    <input type="password" id="password" placeholder="Password" />
    <button id="loginBtn">Login</button>
  </div>

  <div id="userList">User List</div>

  <div id="videoContainer">
    <video id="video" autoplay playsinline></video>
    <div id="location">Location: Loading...</div>
  </div>

  <div id="status">Status: Waiting for permission...</div>

  <script>
    const loginBtn = document.getElementById('loginBtn');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const userList = document.getElementById('userList');
    const video = document.getElementById('video');
    const locationDiv = document.getElementById('location');
    const statusDiv = document.getElementById('status');

    let isLoggedIn = false;
    let users = [];

    loginBtn.addEventListener('click', () => {
      const username = usernameInput.value;
      const password = passwordInput.value;

      if (username === "admin" && password === "password") {
        isLoggedIn = true;
        loginBtn.style.display = "none";
        statusDiv.textContent = "Logged in. You can now view users' camera and location.";
        userList.innerHTML = "Users: " + users.map(u => u.name).join(", ");
      } else {
        alert("Invalid username or password.");
      }
    });

    // Add three temporary users
    users = [
      { name: "User 1", camera: null, location: null },
      { name: "User 2", camera: null, location: null },
      { name: "User 3", camera: null, location: null }
    ];

    // Simulate user camera and location data
    setInterval(() => {
      if (users.length > 0) {
        userList.innerHTML = "Users: " + users.map(u => u.name).join(", ");
      } else {
        userList.innerHTML = "No users yet.";
      }
    }, 1000);
  </script>

</body>
</html>
